<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>4kSend</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/upload/upload.css">
  <link rel="stylesheet" href="/upload/preview-modal.css">
  <link rel="stylesheet" href="/update-note/update-note.css">
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
</head>
<body>
<div class="container">
  <div style="text-align: center;margin-bottom: 30px;"><img src="../images/logo.png" style="width: 20%;"></div>

  <!-- 템플릿 설정 영역 -->
  <div class="section">
    <div class="section-title">템플릿 설정</div>
    <form id="templateForm">
      <div class="template-load-link-wrapper">
        <span class="template-load-link" onclick="loadRecentTemplate()">
          <span class="load-icon">⌛</span>
          최근 템플릿 불러오기
        </span>
      </div>

      <label for="subject">제목</label>
      <div class="template-element">
        <input type="text" id="subject" placeholder="메일 제목">
      </div>

      <label for="body" class="template-element">본문</label>
      <div class="template-variables">
        <span class="variable-label">템플릿 변수:</span>
        <button type="button" class="variable-btn" onclick="insertVariable('이름')">이름</button>
        <button type="button" class="variable-btn" onclick="insertVariable('예매번호')">예매번호</button>
        <button type="button" class="variable-btn" onclick="insertVariable('매수')">매수</button>
      </div>
      <div id="editor" style="min-height: 200px; background:#fff; border:2px solid #e2e8f0; border-radius:12px; margin-bottom: 20px">
        <textarea id="body" name="body" style="display:none;"></textarea>
      </div>

      <label for="template-file">파일</label>
      <div class="file-upload" id="template-file">
        <input type="file" id="templateFileInput" name="templateFile" accept=".jpeg,.jpg,.png,pdf">
        <label for="templateFileInput" class="file-upload-label">
          <div class="file-upload-icon">📁</div>
          <div class="file-upload-text">
            이미지 파일을 선택<br>
            <small>(.pdf, .jpeg, .jpg, .png 파일만 지원)</small>
          </div>
        </label>
      </div>

      <div class="button-group">
        <button type="submit" class="btn-primary">템플릿 설정</button>
      </div>
    </form>
  <span style="display: block; font-size: smaller; color: gray; text-align: center !important;">변경사항을 적용하려면 템플릿 설정을 꼭꼭!! 해주세요!</span>
    <div id="template-result" style="margin-top: 20px;"></div>
  </div>

  <!-- 파일 업로드 및 메일 발송 영역 -->
  <div class="section">
    <div class="section-title">메일 발송</div>
    <form id="uploadForm">
      <div class="source-toggle" role="tablist" aria-label="입력 방식 선택">
        <label class="source-toggle-option active" data-source-option="spreadsheet">
          <input type="radio" name="inputSource" value="spreadsheet" checked>
          <span>스프레드시트 URL</span>
        </label>
        <label class="source-toggle-option" data-source-option="excel">
          <input type="radio" name="inputSource" value="excel">
          <span>Excel 파일</span>
        </label>
      </div>

      <!-- 열 선택 섹션 -->
      <div class="section">
        <div class="column-selector">
          <div class="selector-row">
            <label class="selector-label">이름:</label>
            <select class="column-select" id="nameColumn"></select>
          </div>

          <div class="selector-row">
            <label class="selector-label">이메일:</label>
            <select class="column-select" id="emailColumn"></select>
          </div>

          <div class="selector-row">
            <label class="selector-label">예매번호:</label>
            <select class="column-select" id="ticketColumn"></select>
          </div>
        </div>
      </div>
      <div class="source-panel" data-source-panel="excel">
        <div class="separate-send">
          <label class="separate-send-check">
            <input type="checkbox" id="separateSendEnabled">
            <p style="font-weight: bolder">개별발송</p>
          </label>
          <input type="text" id="from">부터 <input type="text" id="to">까지
        </div>
        <div class="file-upload">
          <input type="file" id="fileInput" name="file" accept=".xls,.xlsx" required>
          <label for="fileInput" class="file-upload-label">
            <div class="file-upload-icon">📁</div>
            <div class="file-upload-text">
              Excel 파일을 선택<br>
              <small>(.xls, .xlsx 파일만 지원)</small>
            </div>
          </label>
        </div>

      </div>

      <div class="source-panel active" data-source-panel="spreadsheet">
        <div class="sheet-preview-panel">
          <label for="spreadsheetUrl">스프레드시트 URL</label>
          <div class="sheet-url-wrapper">
            <input type="text" id="spreadsheetUrl" placeholder="https://docs.google.com/spreadsheets/d/...">
          </div>
        </div>
      </div>

      <div id="sheetSelectionSummary" class="sheet-selection-summary"></div>

      <div class="button-group">
        <button type="button" class="btn-secondary demo-button" onclick="handlePreviewAction()">미리보기</button>
        <button type="submit" class="btn-primary">발송하기</button>
      </div>

      <div class="progress-wrapper">
        <div class="progress-info">
          <div class="progress-text">
            <span class="status-dot"></span>
            메일 발송 진행 상황
          </div>
          <div id="progressDisplay" class="progress-count">
            0 / -
          </div>
        </div>
        <div class="progress-bar-container">
          <div id="progressBar" class="progress-bar"></div>
        </div>
      </div>
    </form>
    <div id="result"></div>
  </div>
</div>

<!-- 모달 -->
<div class="modal-overlay" id="previewModal" onclick="closeModalOnOverlay()">
  <div class="modal-container">
    <div class="modal-header">
      <div>
        <div class="modal-title" style="margin-bottom: 10px;">
          <span>📧</span>
          <span>미리보기</span>
        </div>
        <div class="total-count" id="totalCountDisplay">
          총 0명에게 발송 예정
        </div>
      </div>
      <button class="modal-close" onclick="closePreviewModal()">
        ×
      </button>
    </div>
    <div class="modal-body" id="modalContent">
    </div>
  </div>
</div>
<script src="/global.js"></script>
<script src="/update-note/update-note.js"></script>
<script src="/upload/quill-editor.js"></script>
<script src="/upload/mail-section.js"></script>
<script src="/upload/template-section.js"></script>
</body>
</html>
